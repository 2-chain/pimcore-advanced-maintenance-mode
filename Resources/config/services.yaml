services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    TwoChain\PimcoreAdvancedMaintenanceModeBundle\:
        resource: '../../*'
        exclude:
            - '../../{DependencyInjection,Resources,tests,vendor,docs}'
            - '../../PimcoreAdvancedMaintenanceModeBundle.php'

    # Interface bindings for the storage / admin-detection seams.
    TwoChain\PimcoreAdvancedMaintenanceModeBundle\Service\ContextStorageInterface:
        alias: TwoChain\PimcoreAdvancedMaintenanceModeBundle\Service\PimcoreTmpStoreContextStorage

    TwoChain\PimcoreAdvancedMaintenanceModeBundle\Service\AdminSessionDetectorInterface:
        alias: TwoChain\PimcoreAdvancedMaintenanceModeBundle\Service\AdminSessionDetector

    TwoChain\PimcoreAdvancedMaintenanceModeBundle\Service\ScheduleEnforcementTask:
        tags:
            - { name: pimcore.maintenance.task, type: advanced_maintenance_schedule_enforcement }

    TwoChain\PimcoreAdvancedMaintenanceModeBundle\Service\ExpiryEnforcementTask:
        tags:
            - { name: pimcore.maintenance.task, type: two_chain_advanced_maintenance_ttl_expiry }
        arguments:
            $logger: '@monolog.logger.advanced_maintenance_mode'

    TwoChain\PimcoreAdvancedMaintenanceModeBundle\Command\EnableCommand:
        arguments:
            $logger: '@monolog.logger.advanced_maintenance_mode'

    TwoChain\PimcoreAdvancedMaintenanceModeBundle\Command\HeartbeatCommand:
        arguments:
            $logger: '@monolog.logger.advanced_maintenance_mode'

    TwoChain\PimcoreAdvancedMaintenanceModeBundle\Service\AdminBypassToken:
        arguments:
            $secret: '%kernel.secret%'

    # HttpRuleMatcher needs a request matcher for lazy route resolution. In a
    # host project with cmf_routing or several routers, autowire can't pick one
    # from the interface alone — point it at the standard Symfony router.
    TwoChain\PimcoreAdvancedMaintenanceModeBundle\Service\Matcher\HttpRuleMatcher:
        arguments:
            $router: '@router'

    # Value object built from container parameters.
    TwoChain\PimcoreAdvancedMaintenanceModeBundle\Service\BundleConfiguration:
        arguments:
            $bypassAuthenticatedAdmins:              '%two_chain_advanced_maintenance_mode.bypass_authenticated_admins%'
            $defaultRetryAfter:                      '%two_chain_advanced_maintenance_mode.default_retry_after%'
            $defaultTtl:                             '%two_chain_advanced_maintenance_mode.default_ttl%'
            $expiryWarningThreshold:                 '%two_chain_advanced_maintenance_mode.expiry_warning_threshold%'
            $publicStatusEnabled:                    '%two_chain_advanced_maintenance_mode.public_status_enabled%'
            $publicStatusToken:                      '%two_chain_advanced_maintenance_mode.public_status_token%'
            $autoInjectBanner:                       '%two_chain_advanced_maintenance_mode.auto_inject_banner%'
            $defaultThresholdMinutes:                '%two_chain_advanced_maintenance_mode.default_threshold_minutes%'
            $urgencyOrangeMinutes:                   '%two_chain_advanced_maintenance_mode.urgency_orange_minutes%'
            $urgencyRedMinutes:                      '%two_chain_advanced_maintenance_mode.urgency_red_minutes%'
            $dismissPersistence:                     '%two_chain_advanced_maintenance_mode.dismiss_persistence%'
            $mailOnPreAnnounce:                      '%two_chain_advanced_maintenance_mode.mail_on_pre_announce%'
            $mailOnMaintenanceStart:                 '%two_chain_advanced_maintenance_mode.mail_on_maintenance_start%'
            $mailOnMaintenanceEnd:                   '%two_chain_advanced_maintenance_mode.mail_on_maintenance_end%'
            $mailRecipients:                         '%two_chain_advanced_maintenance_mode.mail_recipients%'
            $mailOnPreAnnounceRecipients:            '%two_chain_advanced_maintenance_mode.mail_on_pre_announce_recipients%'
            $mailOnMaintenanceStartRecipients:       '%two_chain_advanced_maintenance_mode.mail_on_maintenance_start_recipients%'
            $mailOnMaintenanceEndRecipients:         '%two_chain_advanced_maintenance_mode.mail_on_maintenance_end_recipients%'
            $mailTemplate:                           '%two_chain_advanced_maintenance_mode.mail_template%'
            $mailPreAnnounceTemplate:                '%two_chain_advanced_maintenance_mode.mail_pre_announce_template%'
            $mailMaintenanceStartTemplate:           '%two_chain_advanced_maintenance_mode.mail_maintenance_start_template%'
            $mailMaintenanceEndTemplate:             '%two_chain_advanced_maintenance_mode.mail_maintenance_end_template%'
            $notificationWebhooks:                   '%two_chain_advanced_maintenance_mode.notification_webhooks%'
            $defaultScopeData:                       '%two_chain_advanced_maintenance_mode.default_scope%'

    # CompiledRulesProvider holds the SCALAR serialized rules in its argument.
    # The Extension and AttributeExemptionDiscoveryPass populate $rulesData.
    # XmlDumper handles scalar arrays fine, unlike when we used Rule objects directly.
    TwoChain\PimcoreAdvancedMaintenanceModeBundle\Service\Provider\CompiledRulesProvider:
        arguments:
            $rulesData: []

    # ExemptionEvaluator and DebugCommand are built by static factories that
    # call the provider's getRules() (which hydrates the scalar data to Rule objects).
    # Keeps their constructor signatures Rule-object-typed (tests stay simple).
    TwoChain\PimcoreAdvancedMaintenanceModeBundle\Service\ExemptionEvaluator:
        factory: ['TwoChain\PimcoreAdvancedMaintenanceModeBundle\Service\ExemptionEvaluator', 'create']

    TwoChain\PimcoreAdvancedMaintenanceModeBundle\Command\DebugCommand:
        factory: ['TwoChain\PimcoreAdvancedMaintenanceModeBundle\Command\DebugCommand', 'create']

    # Listeners are auto-tagged by autoconfigure (they implement EventSubscriberInterface).
    # No explicit kernel.event_subscriber tag needed thanks to autoconfigure: true.

    # Health check services
    TwoChain\PimcoreAdvancedMaintenanceModeBundle\Service\PendingHealthCheckStorage: ~

    TwoChain\PimcoreAdvancedMaintenanceModeBundle\HealthCheck\HealthCheckRunner:
        arguments:
            $checks: []

    TwoChain\PimcoreAdvancedMaintenanceModeBundle\Maintenance\PostMaintenanceCheckTask:
        arguments:
            $sessionId: 'advanced-maintenance'
            $cacheCleanup: null
            $mailNotifier: '@TwoChain\PimcoreAdvancedMaintenanceModeBundle\Service\MaintenanceMailNotifier'
            $webhookNotifier: '@TwoChain\PimcoreAdvancedMaintenanceModeBundle\Service\MaintenanceWebhookNotifier'
        tags:
            - { name: pimcore.maintenance.task, type: two_chain_advanced_maintenance_post_check }
