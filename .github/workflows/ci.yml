name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel any in-progress run on the same branch / PR when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Static analysis + code style. Runs first because it's fast and catches
  # most regressions before the (heavier) test jobs even start.
  # ---------------------------------------------------------------------------
  quality:
    name: Static analysis + code style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          # Single PHP version is enough — PHPStan and PHP-CS-Fixer analyze
          # source code, not runtime behavior.
          php-version: '8.3'
          # Pimcore's runtime deps require these via composer platform checks.
          extensions: bcmath, exif, gd, intl, pdo_mysql, pdo_sqlite, redis, zip
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: --prefer-dist --no-progress

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --error-format=github

      - name: PHP-CS-Fixer (dry-run)
        # Don't autofix in CI — surface the diff so the contributor knows
        # to run `vendor/bin/php-cs-fixer fix` locally.
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --show-progress=none

  # ---------------------------------------------------------------------------
  # Unit + functional test matrix across all supported PHP versions.
  # Both suites are self-contained — unit tests are pure logic, functional
  # tests boot a minimal Symfony kernel with stubbed Pimcore services. No
  # external infrastructure required.
  # ---------------------------------------------------------------------------
  test:
    name: PHP ${{ matrix.php }} / ${{ matrix.suite }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        suite: [unit, functional]
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # Pimcore's runtime deps pull in these extensions via composer
          # platform checks. List them explicitly so composer install
          # doesn't bail.
          extensions: bcmath, exif, gd, intl, pdo_mysql, pdo_sqlite, redis, zip
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: --prefer-dist --no-progress

      - name: Run ${{ matrix.suite }} tests
        run: vendor/bin/phpunit --testsuite ${{ matrix.suite }}

  # ---------------------------------------------------------------------------
  # Coverage: re-runs the unit suite on PHP 8.3 with pcov + uploads to Codecov.
  # Functional tests are skipped here — they're integration-shaped (TestKernel
  # boot, browser-kit) and don't move the line-coverage needle meaningfully.
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage (unit, PHP 8.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3 with pcov
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: bcmath, exif, gd, intl, pdo_mysql, pdo_sqlite, redis, zip
          # pcov is ~10× faster than xdebug for line-coverage collection.
          coverage: pcov
          tools: composer:v2

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: --prefer-dist --no-progress

      - name: Run unit tests with coverage
        run: vendor/bin/phpunit --testsuite unit --coverage-clover coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          # Public repos don't need a token; this stays unset until the repo
          # is configured at codecov.io. Once linked, set CODECOV_TOKEN in
          # the repo secrets and uncomment:
          # token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Aggregator job: a single green check for branch protection to require.
  # Without this, branch protection would need to list every matrix entry
  # individually (2 PHP × 2 suites = 4 separate check names + quality).
  #
  # The job always runs (via `if: always()`) so it can fail explicitly when
  # any required upstream job didn't succeed — that's what makes it a
  # reliable required check.
  # ---------------------------------------------------------------------------
  ci-passed:
    name: All required checks passed
    runs-on: ubuntu-latest
    needs: [quality, test, coverage]
    if: always()
    steps:
      - name: Verify upstream jobs succeeded
        run: |
          if [[ "${{ needs.quality.result }}" != "success" ]]; then
            echo "::error::Quality checks (PHPStan + PHP-CS-Fixer) did not succeed (result: ${{ needs.quality.result }})"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "::error::Test matrix did not succeed (result: ${{ needs.test.result }})"
            exit 1
          fi
          if [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "::error::Coverage job did not succeed (result: ${{ needs.coverage.result }})"
            exit 1
          fi
          echo "All required checks passed."
